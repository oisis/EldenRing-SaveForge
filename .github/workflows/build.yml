name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Gate: only run on merged PRs or commits with [build] prefix
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Decide whether to build
        id: decide
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT_NAME: ${{ github.event_name }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" && "$PR_MERGED" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            if [[ "$COMMIT_MSG" == \[build\]* ]]; then
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Run tests
        run: go test -v ./backend/... ./tests/...

  build:
    needs: [check, test]
    if: needs.check.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_prefix: ER-SaveForge-macos-arm64
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            artifact_prefix: ER-SaveForge-linux-amd64
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact_prefix: ER-SaveForge-windows-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          VER=$(grep '^VERSION=' Makefile | head -1 | cut -d= -f2)
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build (macOS)
        if: matrix.platform == 'darwin'
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: wails build -platform darwin/${{ matrix.arch }} -o "Elden Ring SaveForge"

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        env:
          CGO_ENABLED: 1
        run: wails build -platform linux/amd64 -tags webkit2_41 -o "Elden Ring SaveForge"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: wails build -platform windows/amd64 -o "Elden Ring SaveForge.exe"

      - name: Package macOS app
        if: matrix.platform == 'darwin'
        run: |
          cd build/bin
          APP_BUNDLE=$(ls -d *.app | head -1)
          zip -r "${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}.zip" "$APP_BUNDLE"

      - name: Package Linux AppImage
        if: matrix.platform == 'linux'
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps
          cp "build/bin/Elden Ring SaveForge" AppDir/usr/bin/
          cp build/appicon.png AppDir/usr/share/icons/hicolor/256x256/apps/elden-ring-saveforge.png
          cp build/appicon.png AppDir/elden-ring-saveforge.png

          cat > AppDir/elden-ring-saveforge.desktop <<'EOF'
          [Desktop Entry]
          Name=Elden Ring SaveForge
          Exec=elden-ring-saveforge
          Icon=elden-ring-saveforge
          Type=Application
          Categories=Utility;Game;
          EOF

          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Elden Ring SaveForge" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool AppDir/ "${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}.AppImage"
          mkdir -p build/bin
          zip "build/bin/${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}.zip" "${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}.AppImage"

      - name: Package Windows app
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Set-Location build/bin
          Compress-Archive -Path "Elden Ring SaveForge.exe" -DestinationPath "${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}
          path: |
            build/bin/${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}.zip
            ${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Makefile
        id: version
        run: |
          VER=$(grep '^VERSION=' Makefile | head -1 | cut -d= -f2)
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Elden Ring SaveForge ${{ steps.version.outputs.tag }}"
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.AppImage
